<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AIGC创意人_竹相左边</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <header class="site-header">
      <button class="brand nav-button active" data-page="home" type="button">AIGC创意人_竹相左边</button>
      <nav class="nav-links" aria-label="页面导航">
        <button class="nav-button" data-page="tools" type="button">工具</button>
        <button class="nav-button" data-page="posts" type="button">图文</button>
        <button class="nav-button" data-page="videos" type="button">视频</button>
      </nav>
    </header>

    <main>
      <section class="page home-page active" id="pageHome" data-page="home" aria-label="首页">
        <div class="home-center">
          <p class="home-kicker">Personal AI Journey</p>
          <h1 id="profileName">AIGC创意人_竹相左边</h1>
          <p class="time-line">
            截止到 <span id="clockText">--</span>
            <span id="journeyLabel">踏上 AI 之路</span>
          </p>

          <div class="journey-counter" aria-label="AI 航行天数">
            <span>航行</span>
            <strong id="journeyDays">0</strong>
            <span>DAY</span>
          </div>

          <blockquote class="quote-box" id="quoteBox">加载语录中...</blockquote>

          <aside class="qr-panel" aria-label="个人二维码">
            <div class="qr-box" id="qrBox">QR</div>
            <p id="qrText">欢迎关注公众号</p>
          </aside>

        </div>
      </section>

      <section class="page content-page" id="pageTools" data-page="tools" aria-label="工具中心">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Tool Center</p>
            <h2>工具中心</h2>
          </div>
          <span id="toolCount">0 个工具</span>
        </div>
        <p class="section-intro" id="profileIntro"></p>
        <div class="tag-list" id="profileTags"></div>
        <div class="tool-grid" id="toolGrid"></div>
      </section>

      <section class="page content-page" id="pagePosts" data-page="posts" aria-label="图文分享">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Articles</p>
            <h2>图文分享</h2>
          </div>
        </div>
        <div class="content-filters" id="postFilters"></div>
        <div class="content-list article-list" id="postList"></div>
      </section>

      <section class="page content-page" id="pageVideos" data-page="videos" aria-label="视频教程">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Videos</p>
            <h2>视频教程</h2>
          </div>
        </div>
        <div class="content-filters" id="videoFilters"></div>
        <div class="content-list video-grid" id="videoList"></div>
      </section>

      <section class="page content-page detail-page" id="pageDetail" data-page="detail" aria-label="内容详情">
        <button class="back-button" id="detailBackButton" type="button">返回列表</button>
        <div class="detail-layout">
          <aside class="detail-sidebar">
            <p class="eyebrow" id="detailSidebarTitle">更多内容</p>
            <div id="detailSiblingList" class="sibling-list"></div>
          </aside>
          <article class="detail-article">
            <p class="content-type" id="detailType"></p>
            <h1 id="detailTitle"></h1>
            <div class="tag-list compact" id="detailTags"></div>
            <p class="detail-summary" id="detailSummary"></p>
            <img class="detail-cover hidden" id="detailCover" alt="">
            <div class="detail-body" id="detailBody"></div>
            <a class="primary-link hidden" id="detailExternalLink" target="_blank" rel="noopener noreferrer">查看原文 / 视频</a>
          </article>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <span>AI 学习与工具站</span>
      <span>轻量门户，工具独立运行</span>
    </footer>

    <script src="./app.js" defer></script>
  </body>
</html>
